<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tennisplatz-Buchung – Westfalia Osterwick</title>
  <meta name="description" content="Tennisplätze der Tennisabteilung Westfalia Osterwick buchen und Verfügbarkeit prüfen." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/tennis-ball.svg" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- ── Topbar ─────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar__brand">
      <img src="/wappen-farbig.png" alt="Wappen" class="topbar__logo" />
      <div class="topbar__titles">
        <span class="topbar__eyebrow">SV Westfalia Osterwick · Tennisabteilung</span>
        <span class="topbar__name">TENNISPLATZ-BUCHUNG</span>
      </div>
    </div>
    <div class="topbar__actions">
      <span class="topbar__user" id="topbar-user" style="display:none"></span>
      <a class="btn btn--ghost" id="btn-login" href="/api/auth/login/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Anmelden
      </a>
      <a class="btn btn--ghost" id="btn-logout" href="/api/auth/logout/" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Abmelden
      </a>
      <a class="btn btn--outline" id="btn-admin" href="/admin/" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
        Verwaltung
      </a>
    </div>
  </header>

  <!-- ── Date Navigator ─────────────────────────────────── -->
  <div class="date-nav">
    <button class="date-nav__arrow" id="btn-prev" aria-label="Vorheriger Tag">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="date-nav__center">
      <div class="date-nav__date" id="date-display"></div>
      <div class="date-nav__today-badge" id="today-badge" style="display:none">Heute</div>
    </div>
    <button class="date-nav__arrow" id="btn-next" aria-label="Nächster Tag">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <!-- ── Day Chips ──────────────────────────────────────── -->
  <div class="day-chips" id="day-chips"></div>

  <!-- ── View Toggle ────────────────────────────────────── -->
  <div class="view-toggle-wrap">
    <div class="view-toggle">
      <button class="view-toggle__btn view-toggle__btn--active" id="btn-day">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Tagesansicht
      </button>
      <button class="view-toggle__btn" id="btn-week">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="3" y1="16" x2="21" y2="16"/></svg>
        Wochenübersicht
      </button>
    </div>
  </div>

  <!-- ── Main Content ───────────────────────────────────── -->
  <main class="main" id="main-content">
    <div class="loader" id="loader">
      <div class="loader__spinner"></div>
      <span>Lade Belegungsplan…</span>
    </div>
  </main>

  <!-- ── Booking Modal ──────────────────────────────────── -->
  <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="modal-title">
      <div class="modal__header">
        <div class="modal__header-icon">🎾</div>
        <div class="modal__header-text">
          <h2 class="modal__title" id="modal-title">Platz buchen</h2>
          <p class="modal__subtitle" id="modal-subtitle"></p>
        </div>
        <button class="modal__close" id="modal-close" aria-label="Schließen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form class="modal__form" id="booking-form" novalidate>
        <input type="hidden" id="f-court-id" />
        <input type="hidden" id="f-date" />

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-name">Dein Name *</label>
            <input class="form-input" type="text" id="f-name" placeholder="Max Mustermann" required autocomplete="name" />
          </div>
          <div class="form-group">
            <label class="form-label" for="f-email">E-Mail-Adresse *</label>
            <input class="form-input" type="email" id="f-email" placeholder="max@example.de" required autocomplete="email" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-start">Von *</label>
            <input class="form-input" type="time" id="f-start" step="1800" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="f-end">Bis *</label>
            <input class="form-input" type="time" id="f-end" step="1800" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="f-phone">Telefon <span class="form-label__opt">(optional)</span></label>
          <input class="form-input" type="tel" id="f-phone" placeholder="+49 151 …" autocomplete="tel" />
        </div>

        <div class="form-group">
          <label class="form-label" for="f-notes">Anmerkungen <span class="form-label__opt">(optional)</span></label>
          <textarea class="form-input form-textarea" id="f-notes" placeholder="z.B. Turniervorbereitung, Gäste dabei …" rows="2"></textarea>
        </div>

        <div class="modal__error" id="modal-error" style="display:none"></div>

        <div class="modal__actions">
          <button type="button" class="btn btn--secondary" id="modal-cancel">Abbrechen</button>
          <button type="submit" class="btn btn--primary" id="modal-submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            Jetzt buchen
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Toast ──────────────────────────────────────────── -->
  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="/app.js"></script>
</body>
</html>
