version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: tenniscourts
      POSTGRES_USER: tennis
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tennis']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tennis:${DB_PASSWORD:-secret}@db:5432/tenniscourts
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: 'false'
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      APPROVAL_REQUIRED: ${APPROVAL_REQUIRED:-false}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-true}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-Lemke@westfalia-osterwick.de}
      SITE_URL: ${SITE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      - static_files:/app/staticfiles

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'

volumes:
  postgres_data:
  static_files:
