# Nginx Server-Block für Tenniscourts auf dem Hetzner Server
# Pfad: /etc/nginx/sites-available/tenniscourts
# Aktivieren mit: ln -s /etc/nginx/sites-available/tenniscourts /etc/nginx/sites-enabled/tenniscourts

server {
    listen 80;
    server_name tennis.westfalia-osterwick.de;

    # ---- React Frontend (statische Dateien) ----------------------------
    root /var/www/tenniscourts/frontend;
    index index.html;

    location / {
        # React-Router SPA-Routing
        try_files $uri $uri/ /index.html;
    }

    # ---- Django REST API -----------------------------------------------
    location /api/ {
        proxy_pass         http://127.0.0.1:8004;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ---- Django Admin --------------------------------------------------
    location /admin/ {
        proxy_pass         http://127.0.0.1:8004;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- Django Static Files (von WhiteNoise) --------------------------
    location /static/ {
        proxy_pass http://127.0.0.1:8004;
    }

    # ---- Sicherheits-Header --------------------------------------------
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ---- Gzip ----------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # ---- Logs ----------------------------------------------------------
    access_log /var/log/nginx/tenniscourts_access.log;
    error_log  /var/log/nginx/tenniscourts_error.log;
}
